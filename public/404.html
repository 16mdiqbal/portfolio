<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    // SPA redirect for GitHub Pages
    // Redirects all 404s back to index.html preserving the path
    var path = window.location.pathname;
    var query = window.location.search;
    var hash = window.location.hash;
    window.location.replace(
      window.location.origin + '/portfolio/?p=' + encodeURIComponent(path + query) + hash
    );
  </script>
</head>
<body></body>
</html>
